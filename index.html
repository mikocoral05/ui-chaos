<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ui-chaos Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 175, 36, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(226, 58, 58, 0.16), transparent 30%),
        #f8f4eb;
      color: #1c130f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 2rem;
      display: grid;
      place-items: center;
    }

    .shell {
      width: min(100%, 720px);
      padding: 2rem;
      border-radius: 24px;
      background: rgba(255, 252, 246, 0.92);
      border: 1px solid rgba(28, 19, 15, 0.08);
      box-shadow: 0 24px 80px rgba(28, 19, 15, 0.12);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    p {
      margin-top: 0;
      color: rgba(28, 19, 15, 0.74);
    }

    .container {
      margin-top: 1.5rem;
      padding: 1.25rem;
      border-radius: 18px;
      border: 1px solid rgba(28, 19, 15, 0.08);
      background: #fff;
      display: grid;
      gap: 0.75rem;
    }

    .row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button,
    input {
      font: inherit;
      border-radius: 999px;
      border: 1px solid rgba(28, 19, 15, 0.12);
      padding: 0.8rem 1rem;
    }

    button {
      cursor: pointer;
      background: #1c130f;
      color: #fff8ef;
    }

    .danger {
      background: #c2362f;
    }

    .status {
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      border-radius: 14px;
      background: #f4ece2;
      color: #5f463a;
      min-height: 3.2rem;
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>ui-chaos</h1>
    <p>
      Randomly stress your staging UI, then export Playwright or Cypress repros when the app melts down.
    </p>

    <div class="container" id="app-root">
      <input type="text" name="email" placeholder="Type here..." />
      <div class="row">
        <button id="increment-btn">Count: <span id="count">0</span></button>
        <button class="danger" id="crash-btn">Crash App</button>
        <button id="fetch-btn" type="button">Fetch Profile</button>
      </div>
    </div>

    <div class="status" id="status">
      Loading demo configuration...
    </div>
    <div class="status" id="network-status">Network request idle.</div>
  </main>

  <script type="module">
    import { initChaos } from './src/index.ts';

    const params = new URLSearchParams(window.location.search);
    const parseBoolean = (key, fallback) => {
      const value = params.get(key);
      if (value === null) {
        return fallback;
      }

      return !/^(false|0|off|no)$/i.test(value);
    };
    const parseNumber = (key, fallback) => {
      const value = params.get(key);
      if (value === null) {
        return fallback;
      }

      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : fallback;
    };

    const appRoot = document.getElementById('app-root');
    const status = document.getElementById('status');
    const networkStatus = document.getElementById('network-status');
    const chaosEnabled = parseBoolean('chaos', true);
    const autoStart = parseBoolean('autoStart', true);
    const enableMonkey = parseBoolean('monkey', true);
    const enableNetwork = parseBoolean('network', false);
    const interactionSelector = params.get('interactionSelector') ?? undefined;
    const excludeSelector = params.get('excludeSelector') ?? undefined;
    const seed = parseNumber('seed', 42);

    const describeMode = () => {
      if (!chaosEnabled) {
        return 'Chaos is disabled. Add ?chaos=true to opt in for the demo.';
      }

      const layers = [];
      if (enableMonkey) {
        layers.push(autoStart ? 'auto-running monkey' : 'manual monkey');
      }

      if (enableNetwork) {
        layers.push('network chaos');
      }

      const layerDescription = layers.length > 0 ? layers.join(' + ') : 'crash recording only';
      return `Chaos demo ready with ${layerDescription}. Seed ${seed}.`;
    };

    const chaos = initChaos({
      enabled: chaosEnabled,
      autoStart,
      enableMonkey,
      target: appRoot,
      intervalMs: parseNumber('intervalMs', 60),
      historySize: 25,
      seed,
      detectEmptyTarget: true,
      exportFormat: 'both',
      downloadOnCrash: parseBoolean('download', false),
      interactionSelector,
      excludeSelector,
      network: enableNetwork
        ? {
            enabled: true,
            minDelayMs: parseNumber('networkDelayMs', 150),
            maxDelayMs: parseNumber('networkDelayMs', 150),
            failureRate: 1,
            failureMode: 'http-error',
            includeUrls: ['/api/profile'],
            statusCodes: [503],
            interceptXhr: false
          }
        : undefined,
      onCrash(event) {
        const generated = [];
        if (event.exports.playwright) {
          generated.push('Playwright');
        }

        if (event.exports.cypress) {
          generated.push('Cypress');
        }

        status.textContent = `Crash captured: ${event.reason}. Generated ${generated.join(' + ')} repro scripts.`;
      }
    });
    status.textContent = describeMode();

    let count = 0;
    const countSpan = document.getElementById('count');
    const incrementButton = document.getElementById('increment-btn');
    const crashButton = document.getElementById('crash-btn');
    const fetchButton = document.getElementById('fetch-btn');

    incrementButton.addEventListener('click', () => {
      count += 1;
      countSpan.textContent = String(count);

      if (count >= 10) {
        throw new Error('Counter reached 10. Unhandled exception triggered.');
      }
    });

    crashButton.addEventListener('click', () => {
      appRoot.innerHTML = '';
    });

    const fetchProfile = async () => {
      networkStatus.textContent = 'Fetching profile...';

      try {
        const response = await fetch('/api/profile');
        const payload = await response.json().catch(() => null);

        if (!response.ok) {
          const reason =
            payload && typeof payload.error === 'string'
              ? `${response.status} ${payload.error}`
              : `HTTP ${response.status}`;
          throw new Error(reason);
        }

        networkStatus.textContent = `Profile loaded with status ${response.status}.`;
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        networkStatus.textContent = `Request failed: ${message}`;
      }
    };

    fetchButton.addEventListener('click', () => {
      void fetchProfile();
    });

    window.chaos = chaos;
    window.demo = {
      fetchProfile,
      getConfig() {
        return {
          chaosEnabled,
          autoStart,
          enableMonkey,
          enableNetwork,
          interactionSelector,
          excludeSelector,
          seed
        };
      }
    };
  </script>
</body>
</html>
